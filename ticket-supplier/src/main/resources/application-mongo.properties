# MongoDB connection. Spring Boot auto-configures the MongoClient + MongoTemplate from this URI
# (MongoConfig was removed — nothing is hardcoded in Java anymore).
spring.data.mongodb.uri=mongodb://localhost:27017/ticketdb

# This profile is NoSQL-only. The always-loaded application.properties still defines a MySQL
# datasource, which Spring Boot would otherwise auto-configure here — starting Hibernate against
# MySQL and requiring it to be up. Exclude the JDBC/JPA auto-config so the mongo profile stands
# alone on MongoDB. (Class names are the Spring Boot 4.x module-relocated ones.)
spring.autoconfigure.exclude=\
  org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
