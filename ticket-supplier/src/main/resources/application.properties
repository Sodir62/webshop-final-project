spring.application.name=ticket-supplier

# The supplier runs on its own port; the broker (8080) talks to it over HTTP.
server.port=8082

# Local sanity-check database: MySQL, passwordless 'ticket' user (DB only listens on 127.0.0.1).
spring.datasource.url=jdbc:mysql://localhost:3306/ticketdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=ticket
spring.datasource.password=

# --- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Auth0 JWT resource server (broker M2M tokens) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${AUTH0_DOMAIN:localhost}/
auth0.api.audience=${AUTH0_API_AUDIENCE:}
