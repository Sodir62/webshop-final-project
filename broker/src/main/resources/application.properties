spring.application.name=broker

# Local MySQL, passwordless 'broker' user (DB only listens on 127.0.0.1).
spring.datasource.url=jdbc:mysql://localhost:3306/brokerdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=broker
spring.datasource.password=

# --- JPA / Hibernate ----------------------------------------------------------
# update: create/extend tables to match the @Entity classes, but KEEP existing
# data (so orders persist across restarts). On a real/prod DB you'd use "validate".
spring.jpa.hibernate.ddl-auto=update
# Print the SQL Hibernate generates, so you can SEE the "SQL integration" happen.
spring.jpa.show-sql=true
