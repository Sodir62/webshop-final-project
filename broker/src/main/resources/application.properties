spring.application.name=broker

# Local MySQL, passwordless 'broker' user (DB only listens on 127.0.0.1).
spring.datasource.url=jdbc:mysql://localhost:3306/brokerdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=broker
spring.datasource.password=

# --- JPA / Hibernate ----------------------------------------------------------
# update: create/extend tables to match the @Entity classes, but KEEP existing
# data (so orders persist across restarts). On a real/prod DB you'd use "validate".
spring.jpa.hibernate.ddl-auto=update
# Print the SQL Hibernate generates, so you can SEE the "SQL integration" happen.
spring.jpa.show-sql=true

# --- Auth0 OAuth2/OIDC ---
spring.security.oauth2.client.registration.auth0.client-id=${AUTH0_CLIENT_ID:}
spring.security.oauth2.client.registration.auth0.client-secret=${AUTH0_CLIENT_SECRET:}
spring.security.oauth2.client.registration.auth0.scope=openid,profile,email
spring.security.oauth2.client.provider.auth0.issuer-uri=https://${AUTH0_DOMAIN:localhost}/

# Auth0 M2M (client_credentials) for broker-to-supplier calls
auth0.m2m.client-id=${AUTH0_M2M_CLIENT_ID:}
auth0.m2m.client-secret=${AUTH0_M2M_CLIENT_SECRET:}
auth0.m2m.audience=${AUTH0_API_AUDIENCE:}
auth0.m2m.token-uri=https://${AUTH0_DOMAIN:localhost}/oauth/token

# Namespace for custom Auth0 claims (roles)
auth0.claims.namespace=${AUTH0_CLAIMS_NAMESPACE:https://webshop.example.com}

# --- Supplier services the broker orders from over HTTP. FOOD and DRINK are served by the
# one food-and-beverages service (it tags each product, so ?type= splits them); TICKET is the
# ticket-supplier service. The in-process stub is the 'stub' profile (tests) only.
# Override per-env, e.g. SUPPLIERS_FOOD_BASE_URL on Azure.

suppliers.food.base-url=http://localhost:8081
suppliers.drink.base-url=http://localhost:8081
suppliers.ticket.base-url=http://localhost:8082

# --- Embedded ActiveMQ Artemis for async order processing ---
spring.artemis.mode=embedded
spring.jms.template.default-destination=order-queue
