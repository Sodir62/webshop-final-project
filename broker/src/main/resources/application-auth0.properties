# Level 2 'auth0' profile: customers and managers log in via Auth0 (OIDC), and the broker
# presents an M2M token to the suppliers. Everything comes from env vars -- no secrets in
# git, and a missing var fails at startup instead of half-working.
spring.security.oauth2.client.registration.auth0.client-id=${AUTH0_CLIENT_ID}
spring.security.oauth2.client.registration.auth0.client-secret=${AUTH0_CLIENT_SECRET}
spring.security.oauth2.client.registration.auth0.scope=openid,profile,email
spring.security.oauth2.client.provider.auth0.issuer-uri=https://${AUTH0_DOMAIN}/

# Auth0 M2M (client_credentials) for broker-to-supplier calls
auth0.m2m.client-id=${AUTH0_M2M_CLIENT_ID}
auth0.m2m.client-secret=${AUTH0_M2M_CLIENT_SECRET}
auth0.m2m.audience=${AUTH0_API_AUDIENCE}
auth0.m2m.token-uri=https://${AUTH0_DOMAIN}/oauth/token

# Namespace for custom Auth0 claims (roles)
auth0.claims.namespace=${AUTH0_CLAIMS_NAMESPACE:https://webshop.example.com}
