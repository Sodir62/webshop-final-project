# Azure cloud profile: PostgreSQL. Activate with --spring.profiles.active=azure.
# Connection details are supplied per-environment via these env vars (no secrets committed).
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Override manager credentials via env vars for production
app.manager.username=${MANAGER_USER:admin}
app.manager.password=${MANAGER_PASSWORD:admin}

# Supplier service URLs (set these to the actual VM IPs / ports)
suppliers.ticket.base-url=${SUPPLIER_TICKET_URL:http://localhost:8082}
suppliers.food.base-url=${SUPPLIER_FOOD_URL:http://localhost:8081}
suppliers.drink.base-url=${SUPPLIER_DRINK_URL:http://localhost:8081}
