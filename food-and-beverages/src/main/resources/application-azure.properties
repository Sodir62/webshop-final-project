# Azure cloud profile: PostgreSQL. Activate with --spring.profiles.active=azure.
# Connection details are supplied per-environment via these env vars (no secrets committed).
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true