spring.application.name=food-and-beverages

# The supplier runs on its own port; the broker (8080) talks to it over HTTP.
server.port=8081

# Local sanity-check database: MySQL, passwordless 'foodbev' user (DB only listens on 127.0.0.1).
# Cloud uses PostgreSQL via the 'azure' profile (see application-azure.properties).
spring.datasource.url=jdbc:mysql://localhost:3306/foodbevdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=foodbev
spring.datasource.password=

# --- JPA / Hibernate ----------------------------------------------------------
# update: create/extend tables to match the @Entity classes, but KEEP existing data.
spring.jpa.hibernate.ddl-auto=update
# Print the SQL Hibernate generates, so the "SQL integration" is visible.
spring.jpa.show-sql=true
